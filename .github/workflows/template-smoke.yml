name: template-smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check the shell scripts
        run: |
          bash -n tools/bootstrap-cdd-project.sh
          bash -n scripts/*.sh
          bash -n tools/cdd-worktree.sh
          bash -n demo/setup.sh demo/teardown.sh demo/lib.sh

      - name: Shellcheck the shell scripts
        run: |
          shellcheck tools/bootstrap-cdd-project.sh tools/cdd-worktree.sh scripts/*.sh demo/*.sh

      - name: Command-set drift check (repo commands vs rendered template)
        run: ./scripts/command-drift-check.sh

      - name: Worktree-helper install smoke (against a throwaway HOME)
        run: ./scripts/install-smoke-assert.sh

      - name: Configure git identity for the scaffold commit
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bootstrap"

      - name: Bootstrap a demo project from the template
        run: |
          ./tools/bootstrap-cdd-project.sh \
            --name "Demo Project" \
            --path /tmp/smoke/demo-project

      - name: Assert the bootstrapped tree is clean
        run: ./scripts/template-smoke-assert.sh /tmp/smoke/demo-project

      - name: Show the scaffold commit
        run: git -C /tmp/smoke/demo-project log --oneline

      - name: Bootstrap a CamelCase-dir project (Fix 2 coverage)
        run: |
          ./tools/bootstrap-cdd-project.sh \
            --name "My CamelCase Project" \
            --path /tmp/smoke/MyProject
          ./scripts/template-smoke-assert.sh /tmp/smoke/MyProject

      - name: Stage a render-only tree and assert it is clean
        run: |
          ./tools/bootstrap-cdd-project.sh --stage \
            --name "Stage Test" \
            --dir stage-test \
            --path /tmp/smoke/stage-render
          test ! -d /tmp/smoke/stage-render/.git
          ./scripts/template-smoke-assert.sh /tmp/smoke/stage-render

      - name: Render from an extracted template snapshot via --template-dir
        run: |
          mkdir -p /tmp/smoke/snapshot
          git archive HEAD template | tar -x -C /tmp/smoke/snapshot
          ./tools/bootstrap-cdd-project.sh --stage \
            --name "Snapshot Test" \
            --dir snap-test \
            --template-dir /tmp/smoke/snapshot/template \
            --path /tmp/smoke/snapshot-render
          ./scripts/template-smoke-assert.sh /tmp/smoke/snapshot-render

      - name: Create a demo instance via the seed overlay (no GitHub side effects)
        run: ./demo/setup.sh mdr_demo_99 --base /tmp/smoke --local-only

      - name: Assert the seeded instance is clean and carries the conflict seam
        run: |
          T=/tmp/smoke/mdr_demo_99
          if grep -rnE '<PROJECT_(NAME|DIR)>' "$T"; then
            echo "found leftover placeholder tokens in the seeded instance" >&2
            exit 1
          fi
          grep -q 'ACTIONS' "$T/doc/knowledge_base/roadmap.md"
          grep -q 'inline_styles' "$T/doc/knowledge_base/roadmap.md"
          echo "demo seed overlay is clean"
