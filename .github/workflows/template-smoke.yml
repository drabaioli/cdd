name: template-smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity for the scaffold commit
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bootstrap"

      - name: Bootstrap a demo project from the template
        run: |
          ./bootstrap-cdd-project.sh \
            --name "Demo Project" \
            --slug demo \
            --path /tmp/smoke/demo-project

      - name: Assert the bootstrapped tree is clean
        run: ./scripts/template-smoke-assert.sh /tmp/smoke/demo-project

      - name: Show the scaffold commit
        run: git -C /tmp/smoke/demo-project log --oneline

      - name: Create a demo instance via the seed overlay (no GitHub side effects)
        run: ./demo/setup.sh mdr_demo_99 --base /tmp/smoke --local-only

      - name: Assert the seeded instance is clean and carries the conflict seam
        run: |
          T=/tmp/smoke/mdr_demo_99
          if grep -rnE '<PROJECT_(NAME|SLUG|DIR)>|\bPROJECT\b' "$T"; then
            echo "found leftover placeholder tokens in the seeded instance" >&2
            exit 1
          fi
          grep -q 'ACTIONS' "$T/doc/knowledge_base/roadmap.md"
          grep -q 'inline_styles' "$T/doc/knowledge_base/roadmap.md"
          test -f "$T/tools/mdr_demo_99-worktree.sh"
          echo "demo seed overlay is clean"
